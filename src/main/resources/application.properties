spring.application.name=sistema-agendamento
server.port=8083

# Ativa o Console do H2 (Para vocę ver as tabelas no navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraçőes do Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:poloesportivo
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123